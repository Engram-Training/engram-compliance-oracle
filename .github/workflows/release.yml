name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  release-contract:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: 'Engram Compliance Oracle — on-chain sanctions screening for Stellar/Soroban'
      relative_path: 'contracts/compliance-oracle'
      package: 'engram-compliance-oracle'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
