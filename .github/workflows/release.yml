name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  release-contract:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: 'Engram Compliance Oracle ${{ github.ref_name }}'
      release_description: 'On-chain sanctions compliance oracle for Stellar/Soroban'
      relative_path: 'contracts/compliance-oracle'
      package: 'engram-compliance-oracle'
